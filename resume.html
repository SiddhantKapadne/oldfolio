<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Siddhant Kapadne</title>
    <style>
        @font-face {
            font-family: 'Sora';
            src: url('font/Sora-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sora';
            src: url('font/static/Sora-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sora';
            src: url('font/static/Sora-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        :root {
            /* Light, clear system with orange CTAs */
            --primary-bg: #FFFFFF;
            --secondary-bg: #F5F5F7;
            --elevated-bg: #FFFFFF;
            --border-subtle: #E5E5EA;
            --text-color: #111111;
            --accent-color: #6E6E73;
            --muted-text: #8E8E93;
            --nav-radius: 2em;
            --grid-gap: 3rem;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            --cta-bg: #FF9500;
            --cta-bg-hover: #FFB340;
            --cta-text: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        .custom-cursor {
            width: 8px;
            height: 8px;
            background: #111111;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: 'Sora', Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* Navigation (match newIndex) */
        nav {
            padding: 1rem 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            background: rgba(248, 248, 250, 0.92);
            border-radius: var(--nav-radius);
            box-shadow: none;
            padding: 8px 25px;
            backdrop-filter: blur(10px);
        }

        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 7px 16px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--cta-bg);
        }

        .nav-links a.active {
            color: var(--cta-bg);
        }

        /* Resume Viewer Section */
        .resume-section {
            padding: 120px 2rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .resume-viewer {
            width: 100%;
            height: 80vh;
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            background: var(--secondary-bg);
        }

        .download-btn{
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--cta-bg);
            color: var(--cta-text);
            text-decoration: none;
            border-radius: 999px;
            margin: 1.5rem 0 0;
            font-weight: 500;
            letter-spacing: 0.02em;
            transform: translateY(0);
            transition: background-color 0.24s ease, transform 0.24s ease;
        }
        .download-btn:hover { transform: translateY(-2px); background-color: var(--cta-bg-hover); }
        .download-btn:active { transform: translateY(0); }

                /* Animated Footer */
                footer {
            padding: 4rem;
            margin-top: 4rem;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, #E5E5EA, #F2F2F7, #E5E5EA);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .footer-section {
            /* background: rgba(255, 255, 255, 0.03); */
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
/* 
        .footer-section:hover {
            transform: translateY(-5px);
        } */

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
            font-weight: 600;
        }

        .footer-section p, .footer-section a {
            color: var(--muted-text);
            text-decoration: none;
            display: block;
            margin: 0.5rem 0;
            transition: all 0.3s ease;
            padding: 0.5rem 0;
        }

        .footer-section a:hover {
            color: var(--cta-bg);
            transform: translateX(10px);
            text-shadow: none;
        }

        @media (max-width: 768px) {
            .resume-viewer { height: 70vh; }
            .footer-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    
    <nav>
        <div class="nav-links">
            <a href="index.html#work">Work</a>
            <a href="about.html">About</a>
            <a class="active" href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="resume-section">
        <object class="resume-viewer" data="Resume.pdf#view=FitH" type="application/pdf">
            <p>Your browser can’t display PDFs. <a class="download-btn" href="Resume.pdf" download>Download Resume</a></p>
        </object>
        <a href="Resume.pdf" download class="download-btn">Download Resume</a>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>PAGES</h3>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="index.html#work">Projects</a>
                <a href="resume.html">Resume</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-section">
                <h3>GET IN TOUCH</h3>
                <p>Let's create something amazing together</p>
                <a href="mailto:ksiddhant46@gmail.com">ksiddhant46@gmail.com</a>
            </div>
            <div class="footer-section">
                <h3>LOCATION</h3>
                <p>Based in India</p>
                <p>Available Worldwide</p>
                <p>© Siddhant Kapadne</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a').forEach(item => {
            item.addEventListener('mouseenter', () => {
                document.querySelector('.custom-cursor').style.transform = 'scale(2)';
            });
            item.addEventListener('mouseleave', () => {
                document.querySelector('.custom-cursor').style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
