<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Siddhant Kapadne</title>
    <style>
        @font-face {
            font-family: 'Sora';
            src: url('font/Sora-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sora';
            src: url('font/static/Sora-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sora';
            src: url('font/static/Sora-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        :root {
            --primary-bg: #000000;
            --text-color: #FFFFFF;
            --accent-color: #A0A0A0;
            --highlight: #98ce41;
            --grid-gap: 3rem;
            --nav-radius: 2em;
            --shadow: 0 10px 40px 0 rgba(30, 41, 59, 0.06), 0 2px 4px 0 rgba(30, 41, 59, 0.019);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        .custom-cursor {
            width: 8px;
            height: 8px;
            background: var(--highlight);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: 'Sora', Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* Navigation (match newIndex) */
        nav {
            padding: 1rem 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            background: #2a2a2a;
            border-radius: var(--nav-radius);
            box-shadow: var(--shadow);
            padding: 8px 25px;
            backdrop-filter: blur(10px);
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 7px 16px;
            transition: color 0.3s ease;
        }

        .active{
            color: var(--highlight) !important;
        }

        .nav-links a:hover {
            color: var(--highlight);
        }

        /* Resume Viewer Section */
        .resume-section {
            padding: 120px 2rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .resume-viewer {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 16px;
            background: #111;
        }

        .download-btn{
            display: inline-block;
            padding: 12px 25px;
            background-color: #98ce41;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 25px;
            margin: 1.5rem 0 0;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 17, 255, 0.3);
            transform: translateY(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .download-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(174, 255, 0, 0.5); background-color: #97dd27; }
        .download-btn:active { transform: translateY(1px); }

                /* Animated Footer */
                footer {
            /* background: linear-gradient(135deg, #121212, #1a1a1a); */
            padding: 4rem;
            margin-top: 4rem;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #98ce41, #0015ff, #98ce41);
            background-size: 200% 100%;
            animation: gradient-slide 3s linear infinite;
        }

        @keyframes gradient-slide {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .footer-section {
            /* background: rgba(255, 255, 255, 0.03); */
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
/* 
        .footer-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 64, 129, 0.1);
        } */

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #98ce41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .footer-section p, .footer-section a {
            color: var(--text-color);
            text-decoration: none;
            display: block;
            margin: 0.5rem 0;
            transition: all 0.3s ease;
            padding: 0.5rem 0;
        }

        .footer-section a:hover {
            color: var(--highlight);
            transform: translateX(10px);
            text-shadow: 0 0 10px rgba(255, 64, 129, 0.5);
        }

        @media (max-width: 768px) {
            .resume-viewer { height: 70vh; }
            .footer-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    
    <nav>
        <div class="nav-links">
            <a href="index.html#work">Work</a>
            <a href="about.html">About</a>
            <a class="active" href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="resume-section">
        <object class="resume-viewer" data="Resume.pdf#view=FitH" type="application/pdf">
            <p>Your browser can’t display PDFs. <a class="download-btn" href="Resume.pdf" download>Download Resume</a></p>
        </object>
        <a href="Resume.pdf" download class="download-btn">Download Resume</a>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>PAGES</h3>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="index.html#work">Projects</a>
                <a href="resume.html">Resume</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-section">
                <h3>GET IN TOUCH</h3>
                <p>Let's create something amazing together</p>
                <a href="mailto:ksiddhant46@gmail.com">ksiddhant46@gmail.com</a>
            </div>
            <div class="footer-section">
                <h3>LOCATION</h3>
                <p>Based in India</p>
                <p>Available Worldwide</p>
                <p>© Siddhant Kapadne</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a').forEach(item => {
            item.addEventListener('mouseenter', () => {
                document.querySelector('.custom-cursor').style.transform = 'scale(2)';
            });
            item.addEventListener('mouseleave', () => {
                document.querySelector('.custom-cursor').style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
