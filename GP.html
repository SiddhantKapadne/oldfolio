<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduation Project</title>
    <style>
        @font-face {
            font-family: 'Sora';
            src: url('font/Sora-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sora';
            src: url('font/static/Sora-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sora';
            src: url('font/static/Sora-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        :root {
            /* Light, clear system with orange CTAs */
            --primary-bg: #FFFFFF;
            --secondary-bg: #F5F5F7;
            --elevated-bg: #FFFFFF;
            --border-subtle: #E5E5EA;
            --text-color: #111111;
            --accent-color: #6E6E73;
            --muted-text: #8E8E93;
            --cta-bg: #FF9500;
            --cta-bg-hover: #FFB340;
            --cta-text: #FFFFFF;
            --grid-gap: 3rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        .custom-cursor {
            width: 8px;
            height: 8px;
            background: #111111;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: 'Sora', Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* Navigation */
        nav {
            padding: 1rem 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            background: rgba(248, 248, 250, 0.92);
            border-radius: 2em;
            box-shadow: none;
            padding: 8px 25px;
            backdrop-filter: blur(10px);
        }

        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 7px 16px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--cta-bg);
        }

        .nav-links a.active {
            color: var(--cta-bg);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1000;
        }

        .hamburger span {
            width: 30px;
            height: 2px;
            background-color: var(--text-color);
            transition: all 0.3s ease-in-out;
        }

        /* Case Study Section */
        .case-study {
            padding-top: 80px;
        }

        .case-study-image {
            width: 100%;
            /* margin-bottom: 2rem; */
        }

        .case-study-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 2rem;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                height: 100vh;
                width: 100%;
                background: rgba(18, 18, 18, 0.95);
                backdrop-filter: blur(30px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: right 0.3s ease-in-out;
            }

            .nav-links.active {
                right: 0;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(8px, 8px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(8px, -8px);
            }

            .case-study {
                padding-top: 60px;
            }
        }

        @media (max-width: 480px) {
            .custom-cursor {
                display: none;
            }
        }

        /* Footer */
        footer {
            padding: 4rem;
            margin-top: 4rem;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, #E5E5EA, #F2F2F7, #E5E5EA);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .footer-section {
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
            font-weight: 600;
        }

        .footer-section p, .footer-section a {
            color: var(--muted-text);
            text-decoration: none;
            display: block;
            margin: 0.5rem 0;
            transition: all 0.3s ease;
            padding: 0.5rem 0;
        }

        .footer-section a:hover {
            color: var(--cta-bg);
            transform: translateX(10px);
            text-shadow: none;
        }

        @media (max-width: 1024px) {
            .footer-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            footer {
                padding: 2rem 1rem;
            }
        }
        
        /* Scroll to Top Button */
        .scroll-top {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease, background 0.2s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .scroll-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .scroll-top:hover {
        }

        .scroll-top svg {
            width: 18px;
            height: 18px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    
    <!-- Navigation starts -->
    <nav>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a class="active" href="index.html#work">Work</a>
            <a href="about.html">About</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <!-- Navigation ends -->

    <section class="case-study">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <span style="display: inline-block; background: rgba(51, 51, 51, 0.09); color: var(--accent-color); padding: 0.8em 2em; border-radius: 1.2em; font-size: 1rem; font-weight: 500;">
                Note: This project page has many images and might take some time to load.
            </span>
        </div>
        <div class="case-study-image">
            <img src="Image/GP/1.png" alt="Case Study Image 1">
        </div>
        <div class="case-study-image">
            <img src="Image/GP/2.png" alt="Case Study Image 2">
        </div>
        <div class="case-study-image">
            <img src="Image/GP/3.png" alt="Case Study Image 3">
        </div>
    </section>

    <!-- Scroll to Top Button -->
    <button class="scroll-top" aria-label="Scroll to top" title="Back to top">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- Footer starts -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>PAGES</h3>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="index.html#work">Projects</a>
                <a href="resume.html">Resume</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="footer-section">
                <h3>GET IN TOUCH</h3>
                <p>Let's create something amazing together</p>
                <a href="mailto:ksiddhant46@gmail.com">ksiddhant46@gmail.com</a>
            </div>
        
            <div class="footer-section">
                <h3>LOCATION</h3>
                <p>Based in India</p>
                <p>Available Worldwide</p>
                <p>© Siddhant Kapadne</p>
            </div>
        </div>
    </footer>
    <!-- Footer ends -->

    <script>
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a').forEach(item => {
            item.addEventListener('mouseenter', () => {
                document.querySelector('.custom-cursor').style.transform = 'scale(2)';
            });
            item.addEventListener('mouseleave', () => {
                document.querySelector('.custom-cursor').style.transform = 'scale(1)';
            });
        });

        // Hamburger menu functionality
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close menu when clicking a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Scroll-to-top behavior
        const scrollTopBtn = document.querySelector('.scroll-top');
        const toggleScrollTopVisibility = () => {
            if (window.scrollY > 400) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        };
        window.addEventListener('scroll', toggleScrollTopVisibility, { passive: true });
        toggleScrollTopVisibility();

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
